name: Build

permissions:
  contents: read
  id-token: write

on:
  workflow_call:
    inputs:
      target:
        required: true
        type: string
      os:
        required: true
        type: string
      static:
        required: false
        type: boolean
        default: false
      test:
        required: false
        type: boolean
        default: false
      upload:
        required: false
        type: boolean
        default: false
      version:
        required: false
        type: string
        default: ""
    outputs:
      version:
        description: "Determined version"
        value: ${{ jobs.build.outputs.version }}

jobs:
  build:
    name: Build ${{ inputs.target }} on ${{ inputs.os }}
    runs-on: ${{ inputs.os }}
    outputs:
      version: ${{ steps.version.outputs.version }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Restore binary from cache
        id: cache-binary
        uses: actions/cache/restore@v5
        with:
          path: target/${{ inputs.target }}/release/tramp-rpc-server
          key: rust-binary-${{ inputs.target }}-${{ hashFiles('server/**', 'Cargo.toml', 'Cargo.lock', 'flake.nix', 'flake.lock', '.cargo/**') }}

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            echo "version=${{ inputs.version }}" >> $GITHUB_OUTPUT
          elif [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          elif [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
          else
            echo "version=ci" >> $GITHUB_OUTPUT
          fi

      - name: Install Nix
        if: steps.cache-binary.outputs.cache-hit != 'true'
        uses: DeterminateSystems/nix-installer-action@main

      - name: Cache Nix store
        if: steps.cache-binary.outputs.cache-hit != 'true'
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-v3-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          restore-prefixes-first-match: nix-v3-${{ runner.os }}-
          gc-max-store-size-linux: 4294967296
          gc-max-store-size-macos: 4294967296
          # Only the nix-setup job needs to write the cache; arch jobs only restore.
          save: false

      - name: Build
        if: steps.cache-binary.outputs.cache-hit != 'true'
        run: |
          nix develop .#${{ inputs.target }} --command bash -c '
          RUSTFLAGS="-D warnings -C target-feature=+crt-static -Zlocation-detail=none -Zunstable-options -Cpanic=immediate-abort" \
          cargo build --release --target ${{ inputs.target }} \
            --manifest-path server/Cargo.toml \
            -Z build-std=std,panic_abort \
            -Z build-std-features="optimize_for_size"
          '
        env:
          STATIC: ${{ inputs.static }}

      - name: Test
        if: ${{ inputs.test && steps.cache-binary.outputs.cache-hit != 'true' }}
        run: nix develop .#${{ inputs.target }} --command cargo test --manifest-path server/Cargo.toml
        env:
          RUSTFLAGS: "-D warnings"

      - name: Save binary to cache
        if: steps.cache-binary.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: target/${{ inputs.target }}/release/tramp-rpc-server
          key: rust-binary-${{ inputs.target }}-${{ hashFiles('server/**', 'Cargo.toml', 'Cargo.lock', 'flake.nix', 'flake.lock', '.cargo/**') }}

      - name: Upload binary for CI
        if: ${{ !inputs.upload }}
        uses: actions/upload-artifact@v7
        with:
          name: tramp-rpc-server-${{ inputs.target }}
          path: target/${{ inputs.target }}/release/tramp-rpc-server
          retention-days: 1

      - name: Package
        if: inputs.upload
        run: |
          mkdir -p dist
          cp target/${{ inputs.target }}/release/tramp-rpc-server dist/
          cd dist
          ls -la tramp-rpc-server
          file tramp-rpc-server || true
          tar -czf tramp-rpc-server-${{ inputs.target }}-${{ steps.version.outputs.version }}.tar.gz tramp-rpc-server
          if [ "${{ startsWith(inputs.target, 'x86_64-unknown-linux') }}" = "true" ]; then
            sha256sum tramp-rpc-server-${{ inputs.target }}-${{ steps.version.outputs.version }}.tar.gz > tramp-rpc-server-${{ inputs.target }}-${{ steps.version.outputs.version }}.tar.gz.sha256
          else
            shasum -a 256 tramp-rpc-server-${{ inputs.target }}-${{ steps.version.outputs.version }}.tar.gz > tramp-rpc-server-${{ inputs.target }}-${{ steps.version.outputs.version }}.tar.gz.sha256
          fi

      - name: Upload artifacts
        if: inputs.upload
        uses: actions/upload-artifact@v7
        with:
          name: tramp-rpc-server-${{ inputs.target }}
          path: |
            dist/*.tar.gz
            dist/*.sha256
